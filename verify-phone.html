<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>手机验证 · Mythical Helper</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="assets/config.js"></script>
    <script defer src="assets/app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/"><span class="logo">✨</span><span class="name">Mythical Helper</span></a>
      <nav>
        <a href="register.html">注册</a>
        <a href="generate.html">生成证书</a>
        <a href="check.html">验证证书</a>
      </nav>
    </header>

    <main class="container">
      <h2>步骤 2 · 手机验证</h2>
      <div class="panel">
        <div class="grid cols-2">
          <div>
            <label for="phone">手机号（含国家区号）</label>
            <input id="phone" placeholder="例如 +1 555 123 4567" />
            <div class="help">目前短信仅支持海外手机号（通过 AWS SNS）</div>
          </div>
          <div class="row" style="align-items:flex-end;">
            <button id="send" class="btn primary">发送短信验证码</button>
          </div>
        </div>
      </div>

      <div class="spacer"></div>

      <div class="panel">
        <div class="grid cols-2">
          <div>
            <label for="code">短信验证码</label>
            <input id="code" inputmode="numeric" pattern="[0-9]*" placeholder="6位数字" />
          </div>
          <div class="row" style="align-items:flex-end;">
            <button id="verify" class="btn">验证并继续</button>
          </div>
        </div>
      </div>

      <p class="help">完成手机验证后可进入“生成证书”。</p>
    </main>

    <script>
      const { qs, setBusy, formatPhone, toast } = window.$mh;
      const api = () => window.MH_API;

      qs('#send').addEventListener('click', async () => {
        const phone = formatPhone(qs('#phone').value);
        if (!phone) return toast('请输入手机号', 'error');
        if (!window.$mh.validatePhone(phone)) return toast('手机号格式不正确', 'error');
        setBusy(qs('#send'), true);
        try {
          await api().sendSmsOtp(phone);
          toast('验证码已发送到手机', 'success');
        } catch (e) {
          toast(e.message || '发送失败', 'error');
        } finally { setBusy(qs('#send'), false); }
      });

      qs('#verify').addEventListener('click', async () => {
        const phone = formatPhone(qs('#phone').value);
        const code = qs('#code').value.trim();
        if (!phone || !code) return toast('请输入手机号和验证码', 'error');
        if (!window.$mh.validatePhone(phone)) return toast('手机号格式不正确', 'error');
        setBusy(qs('#verify'), true);
        try {
          await api().verifySmsOtp(phone, code);
          toast('手机验证成功！正在跳转...', 'success');
          setTimeout(() => location.href = 'generate.html', 1000);
        } catch (e) {
          toast(e.message || '验证失败', 'error');
        } finally { setBusy(qs('#verify'), false); }
      });
    </script>
  </body>
  </html>
