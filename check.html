<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>验证证书 · Mythical Helper</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="assets/config.js"></script>
    <script defer src="assets/app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/"><span class="logo">✨</span><span class="name">Mythical Helper</span></a>
      <nav>
        <a href="register.html">注册</a>
        <a href="verify-phone.html">手机验证</a>
        <a href="generate.html">生成证书</a>
      </nav>
    </header>

    <main class="container">
      <h2>验证证书</h2>
      <div class="panel">
        <div class="grid cols-2">
          <div>
            <label for="serial">证书序列号</label>
            <input id="serial" placeholder="例如 MH-..." />
          </div>
          <div class="row" style="align-items:flex-end;">
            <button id="check" class="btn primary">查询</button>
          </div>
        </div>
      </div>

      <div class="spacer"></div>

      <div id="result" class="panel" style="display:none;">
        <div id="status"></div>
        <div class="grid cols-2">
          <div>
            <p><strong>序列号：</strong> <span id="s"></span></p>
            <p><strong>角色：</strong> <span id="role"></span></p>
            <p><strong>孩子：</strong> <span id="child"></span></p>
          </div>
          <div>
            <p><strong>签发时间：</strong> <span id="issued"></span></p>
            <p><strong>到期时间：</strong> <span id="expires"></span></p>
          </div>
        </div>
      </div>
    </main>

    <script>
      const { qs } = window.$mh;
      const api = () => window.MH_API;

      function setStatus(rec){
        const el = qs('#status');
        el.innerHTML = '';
        const s = document.createElement('span');
        s.className = 'status ' + (rec.status === 'valid' ? 'ok' : rec.status === 'revoked' ? 'bad' : 'warn');
        s.textContent = rec.status === 'valid' ? '有效' : rec.status === 'revoked' ? '已撤销' : '未知';
        el.appendChild(s);
      }

      async function run(serial){
        if (!serial) return toast('请输入序列号', 'error');
        try {
          const rec = await api().checkCertificate(serial);
          qs('#s').textContent = rec.serial;
          qs('#role').textContent = rec.role;
          qs('#child').textContent = rec.display_policy === 'hidden' ? '（隐藏）' : (rec.child_name || '—');
          qs('#issued').textContent = new Date(rec.issued_at).toLocaleString();
          qs('#expires').textContent = new Date(rec.expires_at).toLocaleString();
          setStatus(rec);
          qs('#result').style.display = '';
          toast('证书查询成功', 'success');
        } catch (e) {
          toast(e.message || '未找到该序列号', 'error');
        }
      }

      const url = new URL(location.href);
      const q = url.searchParams.get('serial');
      if (q) { qs('#serial').value = q; run(q); }

      qs('#check').addEventListener('click', () => run(qs('#serial').value.trim()));
    </script>
  </body>
  </html>
