<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>注册 · 邮箱验证 · Mythical Helper</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="assets/config.js"></script>
    <script defer src="assets/app.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/"><span class="logo">✨</span><span class="name">Mythical Helper</span></a>
      <nav>
        <a href="verify-phone.html">手机验证</a>
        <a href="generate.html">生成证书</a>
        <a href="check.html">验证证书</a>
      </nav>
    </header>

    <main class="container">
      <h2>步骤 1 · 邮箱验证</h2>
      <div class="panel">
        <div class="grid">
          <div>
            <label for="email">邮箱</label>
            <input id="email" type="email" placeholder="example@email.com" required />
            <div class="help">我们将发送 6 位验证码到你的邮箱</div>
          </div>
          <div>
            <label>人机验证</label>
            <div id="cf-turnstile" class="cf-turnstile" data-sitekey="0x00000000000000000000000000000000"></div>
            <div class="help">已集成 Cloudflare Turnstile（mock 模式不强制）</div>
          </div>
          <div class="row">
            <button id="send" class="btn primary">发送邮箱验证码</button>
            <span id="sendStatus" class="muted"></span>
          </div>
        </div>
      </div>

      <div class="spacer"></div>

      <div class="panel">
        <div class="grid cols-2">
          <div>
            <label for="code">邮箱验证码</label>
            <input id="code" inputmode="numeric" pattern="[0-9]*" placeholder="6位数字" />
          </div>
          <div class="row" style="align-items:flex-end;">
            <button id="verify" class="btn">验证并继续</button>
          </div>
        </div>
      </div>

      <p class="help">完成邮箱验证后将进入“手机验证”。</p>
    </main>

    <script>
      const { qs, setBusy, cfg, toast } = window.$mh;
      const api = () => window.MH_API;

      // set configured sitekey if provided
      const sitekey = (cfg && cfg.turnstileSiteKey) || '0x00000000000000000000000000000000';
      const cfDiv = document.getElementById('cf-turnstile');
      if (cfDiv) cfDiv.setAttribute('data-sitekey', sitekey);

      qs('#send').addEventListener('click', async () => {
        const email = qs('#email').value.trim();
        if (!email) return toast('请输入邮箱', 'error');
        if (!window.$mh.validateEmail(email)) return toast('邮箱格式不正确', 'error');
        setBusy(qs('#send'), true);
        try {
          // In mock mode we ignore Turnstile token
          const token = window.turnstile && window.turnstile.getResponse ? window.turnstile.getResponse() : '';
          await api().sendEmailOtp(email, token);
          qs('#sendStatus').textContent = '已发送，请查收邮箱验证码';
          toast('验证码已发送到邮箱', 'success');
        } catch (e) {
          toast(e.message || '发送失败', 'error');
        } finally { setBusy(qs('#send'), false); }
      });

      qs('#verify').addEventListener('click', async () => {
        const email = qs('#email').value.trim();
        const code = qs('#code').value.trim();
        if (!email || !code) return toast('请输入邮箱和验证码', 'error');
        if (!window.$mh.validateEmail(email)) return toast('邮箱格式不正确', 'error');
        setBusy(qs('#verify'), true);
        try {
          await api().verifyEmailOtp(email, code);
          toast('邮箱验证成功！正在跳转...', 'success');
          setTimeout(() => location.href = 'verify-phone.html', 1000);
        } catch (e) {
          toast(e.message || '验证失败', 'error');
        } finally { setBusy(qs('#verify'), false); }
      });
    </script>
  </body>
  </html>
